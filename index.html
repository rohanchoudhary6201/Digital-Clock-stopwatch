<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rohan Digital Clock & Stopwatch</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <h1> Rohan digital Clock & stopwatch ⏰ </h1>

    <div class="clock-card">
        <h2>Digital Clock</h2>

        <div id="clock">00:00:00</div>

        <div id="date"></div>
    </div>

    <div class="stopwatch-card">

        <h2>Stopwatch</h2>

        <div id="display">00:00:00.000</div>

        <div class="buttons">

            <button onclick="startStop()">Start</button>

            <button onclick="pauseStop()">Pause</button>

            <button onclick="resetStop()">Reset</button>

            <button onclick="lapTime()">Lap</button>

        </div>

        <ul id="laps"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
